  #     - "7882:7882/udp" # WebRTC UDP traffic

  # Kokoro TTS (Strictly CPU-bound)
  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:v0.2.4
    ports:
      - "5050:8880" # Maps host:5050 to container:8000
    environment:
      - USE_CPU=true
    volumes:
      - ./kokoro_models:/app/models
